services:
  relaydesk:
    build: .
    image: relaydesk:local
    env_file:
      - .env
    ports:
      - "${RELAYDESK_PORT:-3000}:3000"
    environment:
      RELAYDESK_PASSWORD: ${RELAYDESK_PASSWORD:?Set RELAYDESK_PASSWORD in .env}
      RELAYDESK_SESSION_SECRET: ${RELAYDESK_SESSION_SECRET:?Set RELAYDESK_SESSION_SECRET in .env}
      RELAYDESK_CREDENTIALS_KEY: ${RELAYDESK_CREDENTIALS_KEY:?Set RELAYDESK_CREDENTIALS_KEY in .env}
      RELAYDESK_RUNTIME_TYPE: ${RELAYDESK_RUNTIME_TYPE:-mock}
      RELAYDESK_HERMES_BASE_URL: ${RELAYDESK_HERMES_BASE_URL:-}
      RELAYDESK_HERMES_API_KEY: ${RELAYDESK_HERMES_API_KEY:-}
      RELAYDESK_HERMES_TIMEOUT_MS: ${RELAYDESK_HERMES_TIMEOUT_MS:-120000}
      RELAYDESK_RUNTIME_SHARED_PATHS: ${RELAYDESK_RUNTIME_SHARED_PATHS:-}
      RELAYDESK_RUNTIME_ALLOWED_HOSTS: ${RELAYDESK_RUNTIME_ALLOWED_HOSTS:-127.0.0.1,localhost,::1,host.docker.internal}
      RELAYDESK_MAX_UPLOAD_BYTES: ${RELAYDESK_MAX_UPLOAD_BYTES:-52428800}
      RELAYDESK_MAX_IMAGE_BYTES: ${RELAYDESK_MAX_IMAGE_BYTES:-20971520}
      RELAYDESK_COOKIE_SECURE: ${RELAYDESK_COOKIE_SECURE:-false}
      RELAYDESK_CONTENT_WORKSPACE_ENABLED: ${RELAYDESK_CONTENT_WORKSPACE_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - relaydesk-data:/app/data
    restart: unless-stopped
volumes:
  relaydesk-data:
